<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Sprint 38 Phase 6a — `maximum-scale=1.0` blocks the iOS Safari
         zoom that fires when the soft keyboard opens over an input
         smaller than 16px effective. Without this, the layout zooms
         in, then the dismissed keyboard leaves a slippery 2-way
         scroll state. `user-scalable=no` is honored on Android and
         silently ignored by iOS Safari (we keep it for Android; iOS
         honors `maximum-scale=1.0` directly). Accessibility tradeoff
         accepted — Mitora's typography already meets readable sizes. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mitora</title>
    <meta name="description" content="A personal radar for the threads of fluid, high-stakes work." />
    <meta name="theme-color" content="#18181b" />

    <!-- Open Graph -->

    <meta property="og:description" content="The threads of your work, kept in view." />

    <meta property="og:url" content="https://mitora.io" />
    <meta property="og:image" content="https://mitora.io/og-image.png" />
